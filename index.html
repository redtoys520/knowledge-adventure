<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知识大冒险 - 小学五年级学习闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d1b2a 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(100,200,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 2px solid rgba(100,200,255,0.2);
        }
        
        /* 顶部状态栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(90deg, #0d1b2a 0%, #1b3a4b 50%, #0d1b2a 100%);
            color: white;
            border-bottom: 2px solid rgba(100,200,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lives {
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255,100,100,0.5);
        }
        
        .coins {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        /* 屏幕容器 */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        
        .screen.active {
            display: flex;
        }
        
        /* 首页 */
        .home-screen {
            background: radial-gradient(ellipse at center, #1e3a5f 0%, #0d1b2a 70%);
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .game-title {
            color: white;
            margin-bottom: 40px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px rgba(100,200,255,0.5), 0 0 40px rgba(100,200,255,0.3); }
            to { text-shadow: 0 0 30px rgba(100,200,255,0.8), 0 0 60px rgba(100,200,255,0.5), 0 0 80px rgba(100,200,255,0.3); }
        }
        
        .game-title h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #64c8ff, #ffd700, #ff6b6b, #64c8ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .game-title p {
            font-size: 16px;
            opacity: 0.9;
            color: #a0d2eb;
        }
        
        .subject-btn {
            width: 220px;
            padding: 22px;
            margin: 12px;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .subject-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .subject-btn:hover::before {
            left: 100%;
        }
        
        .subject-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        
        .math-btn { 
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 50%, #c44569 100%);
            box-shadow: 0 8px 25px rgba(238,90,111,0.4);
        }
        .chinese-btn { 
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 50%, #096c47 100%);
            box-shadow: 0 8px 25px rgba(68,160,141,0.4);
        }
        .english-btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        
        .collection-btn {
            margin-top: 30px;
            padding: 18px 50px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ff6b35 100%);
            border: none;
            border-radius: 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a2e;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
            position: relative;
            overflow: hidden;
        }
        
        .collection-btn::after {
            content: '✨';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            animation: sparkle 1.5s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(1.2); }
        }
        
        .collection-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(255,215,0,0.6);
        }
        
        /* 关卡选择 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
            padding: 10px;
        }
        
        .level-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .level-btn.locked {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #5d6d7e;
            cursor: not-allowed;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .level-btn.unlocked {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(52,152,219,0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(52,152,219,0.4); }
            50% { box-shadow: 0 4px 25px rgba(52,152,219,0.7); }
        }
        
        .level-btn.completed {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(39,174,96,0.4);
        }
        
        .level-btn.completed::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 12px;
            background: rgba(255,255,255,0.3);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .level-btn:hover:not(.locked) {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .level-btn.boss {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            animation: bossPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes bossPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.6); }
            50% { box-shadow: 0 0 40px rgba(231,76,60,0.9); }
        }
        
        /* 答题界面 */
        .question-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5364 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid rgba(100,200,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .level-badge {
            display: inline-block;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .question-text {
            font-size: 20px;
            line-height: 1.6;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-btn {
            padding: 18px 20px;
            border: 2px solid rgba(100,200,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            color: #fff;
        }
        
        .option-btn:hover {
            border-color: #64c8ff;
            background: rgba(100,200,255,0.1);
            transform: translateX(5px);
        }
        
        .option-btn.selected {
            border-color: #64c8ff;
            background: linear-gradient(90deg, #3498db, #2980b9);
            box-shadow: 0 0 20px rgba(52,152,219,0.5);
        }
        
        .option-btn.correct {
            border-color: #27ae60;
            background: linear-gradient(90deg, #27ae60, #229954);
            animation: correctPulse 0.5s ease;
        }
        
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .option-btn.wrong {
            border-color: #e74c3c;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            animation: shake 0.5s ease-in-out;
        }
        
        .submit-btn {
            margin-top: 20px;
            padding: 18px;
            background: linear-gradient(90deg, #27ae60, #229954);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 25px rgba(39,174,96,0.4);
            transition: all 0.3s;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(39,174,96,0.5);
        }
        
        .submit-btn:disabled {
            background: #5d6d7e;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* 结果页面 */
        .result-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(ellipse at center, #1e3a5f 0%, #0d1b2a 70%);
        }
        
        .result-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: iconBounce 1s ease infinite;
        }
        
        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .result-title {
            font-size: 36px;
            margin-bottom: 15px;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .result-message {
            font-size: 18px;
            color: #a0d2eb;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .result-buttons {
            display: flex;
            gap: 15px;
        }
        
        .result-btn {
            padding: 18px 35px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .primary-btn {
            background: linear-gradient(90deg, #27ae60, #229954);
            color: white;
            box-shadow: 0 8px 25px rgba(39,174,96,0.4);
        }
        
        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(39,174,96,0.5);
        }
        
        .secondary-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .secondary-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 图鉴系统 - 全新设计 */
        .collection-screen {
            background: linear-gradient(180deg, #0d1b2a 0%, #1b3a4b 100%);
        }
        
        .collection-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .collection-header h2 {
            color: #ffd700;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }
        
        .collection-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }
        
        .stat-item {
            text-align: center;
            color: #a0d2eb;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
            padding-bottom: 80px;
        }
        
        .collection-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5364 100%);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .collection-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        .collection-card.locked {
            opacity: 0.6;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }
        
        .collection-card.locked .collection-emoji {
            filter: grayscale(100%);
        }
        
        /* 稀有度边框发光效果 */
        .collection-card.rarity-R { border-color: #90EE90; box-shadow: 0 0 15px rgba(144,238,144,0.3); }
        .collection-card.rarity-SR { border-color: #87CEEB; box-shadow: 0 0 15px rgba(135,206,235,0.3); }
        .collection-card.rarity-SSR { border-color: #DDA0DD; box-shadow: 0 0 15px rgba(221,160,221,0.3); }
        .collection-card.rarity-Legend { border-color: #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .collection-card.rarity-Myth { border-color: #FF69B4; box-shadow: 0 0 20px rgba(255,105,180,0.4); }
        .collection-card.rarity-Ultimate { 
            border-color: #FF4500; 
            box-shadow: 0 0 25px rgba(255,69,0,0.5);
            animation: ultimateGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes ultimateGlow {
            from { box-shadow: 0 0 25px rgba(255,69,0,0.5); }
            to { box-shadow: 0 0 40px rgba(255,215,0,0.7); }
        }
        
        .collection-emoji {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .collection-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
            font-size: 14px;
        }
        
        .collection-card.locked .collection-name {
            color: #5d6d7e;
        }
        
        .collection-stars {
            font-size: 14px;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
            margin-bottom: 5px;
        }
        
        .collection-rarity {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
            font-weight: bold;
        }
        
        .rarity-R { background: linear-gradient(90deg, #90EE90, #7FDD7F); color: #1a472a; }
        .rarity-SR { background: linear-gradient(90deg, #87CEEB, #6BB6FF); color: #1a3a5c; }
        .rarity-SSR { background: linear-gradient(90deg, #DDA0DD, #DA70D6); color: #4a1a4a; }
        .rarity-Legend { background: linear-gradient(90deg, #FFD700, #FFA500); color: #5c4a00; }
        .rarity-Myth { background: linear-gradient(90deg, #FF69B4, #FF1493); color: #5c0030; }
        .rarity-Ultimate { background: linear-gradient(90deg, #FF4500, #FFD700); color: white; }
        
        .unlock-hint {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        /* 图鉴详情弹窗 */
        .collection-detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .collection-detail-overlay.active {
            display: flex;
        }
        
        .collection-detail-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5364 100%);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            border: 3px solid;
            position: relative;
            animation: detailPop 0.5s ease;
        }
        
        @keyframes detailPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .collection-detail-card.rarity-R { border-color: #90EE90; }
        .collection-detail-card.rarity-SR { border-color: #87CEEB; }
        .collection-detail-card.rarity-SSR { border-color: #DDA0DD; }
        .collection-detail-card.rarity-Legend { border-color: #FFD700; box-shadow: 0 0 40px rgba(255,215,0,0.3); }
        .collection-detail-card.rarity-Myth { border-color: #FF69B4; box-shadow: 0 0 40px rgba(255,105,180,0.3); }
        .collection-detail-card.rarity-Ultimate { 
            border-color: #FF4500; 
            box-shadow: 0 0 50px rgba(255,69,0,0.5);
        }
        
        .detail-emoji {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
            animation: detailFloat 2s ease-in-out infinite;
        }
        
        @keyframes detailFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        
        .detail-name {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .detail-rarity {
            font-size: 18px;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .detail-stars {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .detail-desc {
            font-size: 16px;
            color: #a0d2eb;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }
        
        .detail-close-btn {
            padding: 15px 40px;
            background: linear-gradient(90deg, #3498db, #2980b9);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* 道具栏 */
        .items-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 1px solid rgba(100,200,255,0.2);
        }
        
        .item-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            cursor: pointer;
            font-size: 24px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .item-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .item-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .item-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            color: white;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-3px);
        }
        
        /* 动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .bounce {
            animation: bounce 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* 抽卡特效 - 升级版 */
        .gacha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;

        // 兼容旧版本存档

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    if (screenId === 'homeScreen') {
        document.getElementById('header').style.display = 'none';
    } else {
        updateHeader();
    }
}

// 选择学科
function selectSubject(subject) {
    state.currentSubject = subject;
    const names = { math: '数学', chinese: '语文', english: '英语' };
    document.getElementById('levelTitle').textContent = names[subject] + '挑战';
    renderLevels();
    showScreen('levelScreen');
}

// 渲染关卡
function renderLevels() {
    const grid = document.getElementById('levelGrid');
    grid.innerHTML = '';
    const unlocked = state.unlockedLevels[state.currentSubject];
    
    for (let i = 1; i <= 20; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.textContent = i;
        
        // BOSS关（每10关）
        if (i % 10 === 0) {
            btn.classList.add('boss');
        }
        
        if (i < unlocked) {
            btn.classList.add('completed');
        } else if (i === unlocked) {
            btn.classList.add('unlocked');
            btn.onclick = () => startLevel(i);
        } else {
            btn.classList.add('locked');
        }
        
        grid.appendChild(btn);
    }
}

// 开始关卡
function startLevel(level) {
    state.currentLevel = level;
    state.selectedOption = -1;
    const q = QUESTIONS[state.currentSubject].find(q => q.level === level);
    
    document.getElementById('levelBadge').textContent = `关卡 ${level}${level % 10 === 0 ? ' 🔥BOSS' : ''}`;
    document.getElementById('questionText').textContent = q.question;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = String.fromCharCode(65 + idx) + '. ' + opt;
        btn.onclick = () => selectOption(idx);
        container.appendChild(btn);
    });
    
    updateItems();
    document.getElementById('submitBtn').disabled = true;
    showScreen('gameScreen');
}

// 选择选项
function selectOption(idx) {
    state.selectedOption = idx;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
    });
    document.getElementById('submitBtn').disabled = false;
}

// 使用道具
function useHint() {
    if (state.items.hint <= 0) return;
    state.items.hint--;
    
    const q = QUESTIONS[state.currentSubject].find(q => q.level === state.currentLevel);
    const wrongOptions = q.options.map((_, i) => i).filter(i => i !== q.answer);
    const toRemove = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
    
    const buttons = document.querySelectorAll('.option-btn');
    buttons[toRemove].style.visibility = 'hidden';
    saveState();
    updateItems();
}

function useSkip() {
    if (state.items.skip <= 0) return;
    state.items.skip--;
    saveState();
    updateItems();
    submitAnswer(true);
}

function useFreeze() {
    if (state.items.freeze <= 0) return;
    state.items.freeze--;
    saveState();
    updateItems();
    alert('⏸️ 时间暂停！（演示效果）');
}

function updateItems() {
    document.getElementById('hintCount').textContent = state.items.hint;
    document.getElementById('skipCount').textContent = state.items.skip;
    document.getElementById('freezeCount').textContent = state.items.freeze;
    
    document.getElementById('hintBtn').disabled = state.items.hint <= 0;
    document.getElementById('skipBtn').disabled = state.items.skip <= 0;
    document.getElementById('freezeBtn').disabled = state.items.freeze <= 0;
}

// 显示连击
function showCombo() {
    if (state.combo >= 3) {
        const comboEl = document.getElementById('comboDisplay');
        comboEl.textContent = `🔥 ${state.combo} 连击!`;
        comboEl.classList.add('show');
        setTimeout(() => comboEl.classList.remove('show'), 1000);
    }
}

// 创建粒子效果
function createParticles() {
    const container = document.getElementById('particles');
    container.innerHTML = '';
    const colors = ['#FFD700', '#FF69B4', '#87CEEB', '#90EE90', '#FFA500'];
    
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 2 + 's';
        particle.style.width = Math.random() * 15 + 5 + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
    }
}

// 提交答案
function submitAnswer(skipped = false) {
    const q = QUESTIONS[state.currentSubject].find(q => q.level === state.currentLevel);
    const correct = skipped || state.selectedOption === q.answer;
    
    if (correct) {
        state.combo++;
        const reward = 10 + Math.min(state.combo, 5) * 2;
        state.coins += reward;
        showCombo();
        
        if (state.unlockedLevels[state.currentSubject] === state.currentLevel) {
            state.unlockedLevels[state.currentSubject]++;
        }
        
        saveState();
        
        // 检查是否解锁图鉴
        const totalLevel = (state.currentSubject === 'math' ? 0 : state.currentSubject === 'chinese' ? 20 : 40) + state.currentLevel;
        const collection = CONFIG.COLLECTIONS.find(c => c.level === totalLevel);
        
        if (collection && !state.collections.includes(collection.id)) {
            state.collections.push(collection.id);
            saveState();
            showGacha(collection);
        } else {
            showResult(true, reward);
        }
    } else {
        state.lives--;
        state.combo = 0;
        saveState();
        
        if (state.lives <= 0) {
            showResult(false, 0, true);
        } else {
            showResult(false, 0, false);
        }
    }
}

// 显示结果
function showResult(success, reward, gameOver = false) {
    const screen = document.getElementById('resultScreen');
    const icon = document.getElementById('resultIcon');
    const title = document.getElementById('resultTitle');
    const msg = document.getElementById('resultMessage');
    const btns = document.getElementById('resultButtons');
    
    if (gameOver) {
        icon.textContent = '💔';
        title.textContent = '生命耗尽';
        title.style.color = '#e74c3c';
        msg.textContent = '别灰心，休息一下再来挑战！';
        btns.innerHTML = `
            <button class="result-btn primary-btn" onclick="resetGame()">重新开始</button>
            <button class="result-btn secondary-btn" onclick="goHome()">返回首页</button>
        `;
    } else if (success) {
        icon.textContent = state.combo >= 5 ? '🔥' : '✅';
        title.textContent = state.combo >= 5 ? '太棒了！' : '回答正确！';
        title.style.color = '#27ae60';
        msg.innerHTML = `💰 获得 ${reward} 金币<br>${state.combo > 1 ? `🔥 连击 x${state.combo}` : ''}`;
        btns.innerHTML = `
            <button class="result-btn primary-btn" onclick="nextLevel()">下一关</button>
            <button class="result-btn secondary-btn" onclick="backToLevels()">返回关卡</button>
        `;
    } else {
        const q = QUESTIONS[state.currentSubject].find(q => q.level === state.currentLevel);
        icon.textContent = '❌';
        title.textContent = '回答错误';
        title.style.color = '#e74c3c';
        msg.innerHTML = `正确答案是: ${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}<br>❤️ 剩余生命: ${state.lives}`;
        btns.innerHTML = `
            <button class="result-btn primary-btn" onclick="retryLevel()">再试一次</button>
            <button class="result-btn secondary-btn" onclick="backToLevels()">返回关卡</button>
        `;
    }
    
    showScreen('resultScreen');
}

// 显示抽卡
function showGacha(collection) {
    createParticles();
    document.getElementById('gachaEmoji').textContent = collection.emoji;
    document.getElementById('gachaTitle').textContent = collection.name;
    document.getElementById('gachaRarity').textContent = collection.rarity;
    document.getElementById('gachaRarity').className = 'gacha-rarity rarity-' + collection.rarity;
    document.getElementById('gachaStars').textContent = '★'.repeat(collection.stars);
    
    const card = document.getElementById('gachaCard');
    card.className = 'gacha-card rarity-' + collection.rarity;
    
    document.getElementById('gachaOverlay').classList.add('active');
}

function closeGacha() {
    document.getElementById('gachaOverlay').classList.remove('active');
    showResult(true, 10 + Math.min(state.combo, 5) * 2);
}

// 导航函数
function nextLevel() {
    state.currentLevel++;
    if (state.currentLevel <= 20) {
        startLevel(state.currentLevel);
    } else {
        // 通关所有关卡
        showScreen('resultScreen');
        document.getElementById('resultIcon').textContent = '🏆';
        document.getElementById('resultTitle').textContent = '恭喜通关！';
        document.getElementById('resultTitle').style.color = '#ffd700';
        document.getElementById('resultMessage').innerHTML = '太厉害了！你已经通关了所有关卡！<br>💰 总金币: ' + state.coins;
        document.getElementById('resultButtons').innerHTML = `
            <button class="result-btn primary-btn" onclick="goHome()">返回首页</button>
            <button class="result-btn secondary-btn" onclick="showCollection()">查看图鉴</button>
        `;
    }
}

function retryLevel() {
    startLevel(state.currentLevel);
}

function backToLevels() {
    renderLevels();
    showScreen('levelScreen');
}

function goHome() {
    state.currentSubject = null;
    state.currentLevel = null;
    showScreen('homeScreen');
}

function resetGame() {
    state.lives = 3;
    state.combo = 0;
    saveState();
    goHome();
}

// 显示图鉴
function showCollection() {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = '';
    
    // 统计
    const rareCount = state.collections.filter(id => {
        const c = CONFIG.COLLECTIONS.find(col => col.id === id);
        return c && ['SSR', 'Legend', 'Myth'].includes(c.rarity);
    }).length;
    
    document.getElementById('collectionCount').textContent = state.collections.length;
    document.getElementById('rareCount').textContent = rareCount;
    
    CONFIG.COLLECTIONS.forEach(c => {
        const unlocked = state.collections.includes(c.id);
        const card = document.createElement('div');
        card.className = `collection-card rarity-${c.rarity} ${unlocked ? '' : 'locked'}`;
        card.onclick = () => unlocked && showCollectionDetail(c);
        
        card.innerHTML = `
            <span class="collection-emoji">${c.emoji}</span>
            <div class="collection-name">${unlocked ? c.name : '???'}</div>
            <div class="collection-stars">${'★'.repeat(c.stars)}</div>
            <span class="collection-rarity rarity-${c.rarity}">${c.rarity}</span>
            ${unlocked ? '' : `<div class="unlock-hint">通关第${c.level}关解锁</div>`}
        `;
        grid.appendChild(card);
    });
    
    showScreen('collectionScreen');
}

// 显示图鉴详情
function showCollectionDetail(collection) {
    document.getElementById('detailEmoji').textContent = collection.emoji;
    document.getElementById('detailName').textContent = collection.name;
    document.getElementById('detailRarity').textContent = collection.rarity;
    document.getElementById('detailRarity').className = 'detail-rarity rarity-' + collection.rarity;
    document.getElementById('detailStars').textContent = '★'.repeat(collection.stars);
    document.getElementById('detailDesc').textContent = collection.desc;
    
    const card = document.getElementById('detailCard');
    card.className = 'collection-detail-card rarity-' + collection.rarity;
    
    document.getElementById('collectionDetail').classList.add('active');
}

function closeCollectionDetail() {
    document.getElementById('collectionDetail').classList.remove('active');
}

// 初始化
window.onload = () => {
    loadState();
};
</script>
